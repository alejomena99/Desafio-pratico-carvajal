namespace: fox-jokes

dockerhub:
  username: ""
  password: ""

global:
  imagePullSecrets:
    name: dockerhub-secret


fox-jokes-dashboard:
  namespace: fox-jokes
  replicaCount: 1
  image:
    repository: alejomena99/fox-jokes-dashboard
    tag: latest
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 80
  containerPort: 80
  env:
    API_URL: "http://gateway.local"
  ingress:
    enabled: true
    host: dashboard.local
    path: /

fox-jokes-gateway:
  namespace: fox-jokes
  replicaCount: 1
  image:
    repository: alejomena99/fox-jokes-gateway
    tag: latest
    pullPolicy: Always
  service:
    type: ClusterIP
    clusterIP: None 
    port: 80
  containerPort: 80
  ingress:
    enabled: true
    host: gateway.local
    path: /