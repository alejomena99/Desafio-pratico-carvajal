{{- if .Values.dockerhub.username }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.global.imagePullSecrets.name }}
  namespace: {{ .Values.namespace }}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ printf "{\"auths\":{\"https://index.docker.io/v1/\":{\"auth\":\"%s\"}}}" (printf "%s:%s" .Values.dockerhub.username .Values.dockerhub.password | b64enc) | b64enc }}
{{- end }}